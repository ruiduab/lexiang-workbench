<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>联想乐享 · 对话分享</title>
<script src="/marked.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f7;--card:#fff;--border:#e5e5e5;--fg:#1d1d1f;--muted:#666;--accent:#e0001b;--font-cn:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
body{background:var(--bg);font-family:var(--font-cn);color:var(--fg);min-height:100vh}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.logo{font-weight:900;font-size:16px;color:var(--accent)}
.header-sub{font-size:12px;color:var(--muted);flex:1}
.cta{display:inline-flex;align-items:center;padding:6px 14px;background:var(--accent);color:#fff;border-radius:8px;font-size:13px;text-decoration:none;font-weight:600}
.container{max-width:720px;margin:0 auto;padding:24px 16px 64px}
.conv-title{font-size:18px;font-weight:700;margin-bottom:4px}
.conv-meta{font-size:12px;color:var(--muted);margin-bottom:24px}
.msg{display:flex;gap:10px;margin-bottom:16px}
.msg.user{flex-direction:row-reverse}
.mavatar{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.msg.user .mavatar{background:var(--border);color:var(--muted)}
.mbubble{max-width:80%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.65;background:var(--card);border:1px solid var(--border)}
.msg.user .mbubble{background:#f0f0f0;border-color:transparent}
.mbubble p{margin:0 0 8px}.mbubble p:last-child{margin:0}
.mbubble h1,.mbubble h2,.mbubble h3{font-size:15px;font-weight:700;margin:8px 0 4px}
.mbubble ul,.mbubble ol{padding-left:20px;margin:4px 0}
.mbubble a{color:var(--accent);text-decoration:none}
.loading{text-align:center;padding:60px;color:var(--muted)}
.error{text-align:center;padding:60px;color:#ef4444}
</style>
</head>
<body>
<div class="header">
  <span class="logo">联想乐享</span>
  <span class="header-sub">· 对话分享</span>
  <a class="cta" href="/">开始咨询</a>
</div>
<div class="container" id="container">
  <div class="loading">加载中…</div>
</div>
<script>
const token = location.pathname.split('/share/')[1];
fetch('/api/chat/share/' + token)
  .then(r => {
    if (!r.ok) {
      if (r.status === 404) throw new Error('分享链接已过期或不存在');
      throw new Error('加载失败，请稍后重试');
    }
    return r.json();
  })
  .then(data => {
    if (data.error) {
      document.getElementById('container').innerHTML = `<div class="error">${data.error}</div>`;
      return;
    }
    const { conv, messages } = data;
    const title = conv.title || '联想乐享对话';
    document.title = title + ' · 联想乐享';
    const date = conv.created_at ? new Date(conv.created_at).toLocaleDateString('zh-CN') : '';
    let html = `<div class="conv-title">${title}</div><div class="conv-meta">${date} · ${messages.length} 条消息</div>`;
    messages.forEach(m => {
      const isUser = m.role === 'user';
      const content = isUser
        ? m.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        : (typeof marked !== 'undefined' ? marked.parse(m.content) : m.content);
      html += `<div class="msg ${isUser ? 'user' : 'ai'}">
        <div class="mavatar">${isUser ? '你' : '乐'}</div>
        <div class="mbubble">${content}</div>
      </div>`;
    });
    document.getElementById('container').innerHTML = html;
  })
  .catch(e => {
    document.getElementById('container').innerHTML = `<div class="error">${e.message || '加载失败，请稍后重试'}</div>`;
  });
</script>
</body>
</html>
